services:
    hammerdb:
        network_mode: host
        platform: linux/amd64
        build: 
          context: .
          dockerfile: dockerfile
          platforms:
            - linux/amd64
        env_file:
          - ${HAMMERDB_ENV_FILE}
        environment:
          - RUN_MODE
          - BENCHMARK
        volumes:
          - ./scripts:/opt/HammerDB-5.0/scripts
          - ./output:/tmp
